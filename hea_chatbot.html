<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEA Designer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #F7F8FA;
  --bg2:      #FFFFFF;
  --bg3:      #F0F2F6;
  --border:   #E4E7ED;
  --border2:  #CDD2DC;
  --teal:     #0A8F62;
  --teal-lo:  rgba(10,143,98,0.08);
  --teal-dk:  #076B4A;
  --amber:    #B86A00;
  --amber-lo: rgba(184,106,0,0.08);
  --txt:      #1A1E27;
  --txt2:     #5A6275;
  --txt3:     #9AA0AE;
  --mono:     'DM Mono', monospace;
  --serif:    'Instrument Serif', serif;
  --sans:     'DM Sans', sans-serif;
  --r:        10px;
  --shadow:   0 1px 3px rgba(0,0,0,0.07);
  --shadow2:  0 4px 12px rgba(0,0,0,0.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--txt);
  font-family: var(--sans);
  font-size: 15px;
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}

.shell {
  display: flex; flex-direction: column;
  height: 100%;
  max-width: 820px; margin: 0 auto;
  width: 100%; padding: 0 20px;
}

/* ── 헤더 ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark {
  width: 32px; height: 32px;
  background: var(--teal); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 10px; color: #fff; font-weight: 500;
}
.brand-name { font-family: var(--mono); font-size: 14px; font-weight: 500; }
.brand-name em { color: var(--teal); font-style: normal; }
.status-row { display: flex; align-items: center; gap: 10px; }
.status-dot { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 11px; color: var(--txt3); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: pulse 2.4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.model-tag { font-family: var(--mono); font-size: 10px; color: var(--txt3); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; background: var(--bg2); }

/* ── 채팅 영역 ── */
.chat-area {
  flex: 1; overflow-y: auto;
  padding: 24px 0 8px;
  display: flex; flex-direction: column;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── 메시지 ── */
.msg {
  display: flex; gap: 12px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
  animation: msgIn 0.2s ease;
}
.msg:last-child { border-bottom: none; }
@keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.msg-avatar {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  flex-shrink: 0; margin-top: 2px;
}
.av-user { background: var(--bg3); border: 1px solid var(--border); color: var(--txt2); }
.av-ai   { background: var(--teal); color: #fff; }
.msg-body { flex: 1; min-width: 0; }
.msg-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.msg-name { font-family: var(--mono); font-size: 11px; font-weight: 500; }
.msg-name.ai   { color: var(--teal-dk); }
.msg-name.user { color: var(--txt2); }
.msg-time { font-family: var(--mono); font-size: 10px; color: var(--txt3); }

.msg-text { font-size: 14.5px; line-height: 1.75; color: var(--txt); }
.msg-text p { margin-bottom: 10px; }
.msg-text p:last-child { margin-bottom: 0; }
.msg-text h2 {
  font-family: var(--serif); font-size: 17px; font-weight: 400; font-style: italic;
  color: var(--txt); margin: 16px 0 10px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.msg-text h2:first-child { margin-top: 0; }
.msg-text h3 { font-family: var(--mono); font-size: 11px; color: var(--teal-dk); text-transform: uppercase; letter-spacing: 0.07em; margin: 14px 0 8px; font-weight: 500; }
.msg-text strong { color: var(--teal-dk); font-weight: 500; }
.msg-text code { font-family: var(--mono); font-size: 12px; background: var(--bg3); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; color: var(--amber); }



/* ── 조성 카드 ── */
.comp-card { margin: 10px 0; border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); }
.comp-card.best { border-color: rgba(10,143,98,.35); }
.comp-card-head { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; background: var(--bg3); border-bottom: 1px solid var(--border); }
.comp-formula { font-family: var(--mono); font-size: 12px; color: var(--teal-dk); font-weight: 500; }
.comp-badge { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 4px; }
.badge-best { background: var(--teal-lo); color: var(--teal-dk); border: 1px solid rgba(10,143,98,.2); }
.comp-stats { display: grid; grid-template-columns: repeat(4,1fr); background: var(--bg2); }
.comp-stat { padding: 9px 14px; border-right: 1px solid var(--border); }
.comp-stat:last-child { border-right: none; }
.comp-stat-lbl { font-family: var(--mono); font-size: 10px; color: var(--txt3); margin-bottom: 3px; }
.comp-stat-val { font-family: var(--mono); font-size: 12px; color: var(--txt); font-weight: 500; }
.comp-stat-val.ok   { color: var(--teal-dk); }
.comp-stat-val.warn { color: var(--amber); }

/* ── 트레이스 태그 ── */
.trace-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.ttag { font-family: var(--mono); font-size: 10px; padding: 3px 9px; border-radius: 20px; }
.ttag.ok   { background: var(--teal-lo);  border: 1px solid rgba(10,143,98,.2);  color: var(--teal-dk); }
.ttag.warn { background: var(--amber-lo); border: 1px solid rgba(184,106,0,.2);  color: var(--amber); }
.ttag.info { background: var(--bg3);      border: 1px solid var(--border);        color: var(--txt3); }

/* ── 예시 칩 ── */
.suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.sug-chip { font-family: var(--mono); font-size: 11px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 20px; color: var(--txt2); cursor: pointer; background: var(--bg2); box-shadow: var(--shadow); transition: border-color .15s, color .15s; text-align: left; line-height: 1.4; }
.sug-chip:hover { border-color: var(--teal); color: var(--teal-dk); }

/* ── 경고 배너 ── */
.warn-banner { background: var(--amber-lo); border: 1px solid rgba(184,106,0,.2); border-radius: 6px; padding: 8px 12px; margin-top: 10px; font-family: var(--mono); font-size: 11px; color: var(--amber); line-height: 1.5; }

/* ── 입력창 ── */
.input-area { flex-shrink: 0; padding: 12px 0 18px; border-top: 1px solid var(--border); }
.input-wrap { display: flex; align-items: flex-end; gap: 10px; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 10px 10px 16px; box-shadow: var(--shadow); transition: border-color .15s, box-shadow .15s; }
.input-wrap:focus-within { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(10,143,98,.10), var(--shadow); }
textarea { flex: 1; background: transparent; border: none; outline: none; resize: none; font-family: var(--sans); font-size: 14px; color: var(--txt); line-height: 1.6; max-height: 140px; min-height: 22px; overflow-y: auto; scrollbar-width: none; }
textarea::placeholder { color: var(--txt3); }
textarea::-webkit-scrollbar { display: none; }
.send-btn { width: 36px; height: 36px; border-radius: 8px; background: var(--teal); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #fff; transition: background .15s, transform .1s; box-shadow: 0 1px 3px rgba(10,143,98,.3); }
.send-btn:hover   { background: var(--teal-dk); }
.send-btn:active  { transform: scale(.95); }
.send-btn:disabled { background: var(--border2); cursor: not-allowed; box-shadow: none; }
.send-btn svg { width: 16px; height: 16px; }
.input-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 7px; padding: 0 4px; }
.input-hint { font-family: var(--mono); font-size: 10px; color: var(--txt3); }
.char-count { font-family: var(--mono); font-size: 10px; color: var(--txt3); }
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">HEA</div>
      <div class="brand-name"><em>HEA</em> Designer</div>
    </div>
    <div class="status-row">
      <div class="status-dot"><div class="dot"></div>RAG 파이프라인</div>
      <div class="model-tag">claude-sonnet-4-5</div>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="msg">
      <div class="msg-avatar av-ai">HEA</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-name ai">HEA Designer</span>
          <span class="msg-time" id="initTime"></span>
        </div>
        <div class="msg-text">
          <p>안녕하세요. BCC 고엔트로피 합금 설계 AI입니다.</p>
          <p>목표 물성과 원소 조건을 자연어로 입력하면 <strong>실험 DB → 논문 → ML 예측</strong> 3계층 근거로 조성을 추천합니다.</p>
        </div>
        <div class="suggestions">
          <button class="sug-chip" onclick="fillQuery(this)">Ti-Nb-Ta 기반 YS 1000 MPa, 연신율 15% 이상 조성 추천해줘</button>
          <button class="sug-chip" onclick="fillQuery(this)">고온(800°C) 강도 높은 Mo-W-Ta 계 합금 추천해줘</button>
          <button class="sug-chip" onclick="fillQuery(this)">항공우주용 경량 내화 HEA. Hf 없이 Ti-V-Nb-Ta 조합으로</button>
          <button class="sug-chip" onclick="fillQuery(this)">VEC 5 이하 BCC 단상 조건에서 항복강도 최대화 조성 3개만</button>
        </div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="queryInput" placeholder="합금 조성 조건을 자연어로 입력하세요 (Shift+Enter 줄바꿈)" rows="1" maxlength="1000"
        oninput="autoResize(this); updateCount(this)" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 8H2M14 8L9 3M14 8L9 13"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="input-hint">Enter 전송 · Shift+Enter 줄바꿈</span>
      <span class="char-count" id="charCount">0 / 1000</span>
    </div>
  </div>

</div>
<script>
const API_URL = 'http://localhost:8000/chat';
const $ = id => document.getElementById(id);
let history = [], busy = false;

function nowStr() { return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px'; }
function updateCount(el) { $('charCount').textContent=el.value.length+' / 1000'; $('sendBtn').disabled=!el.value.trim()||busy; }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault(); if(!busy&&$('queryInput').value.trim()) sendMessage();} }
function fillQuery(btn) { const ta=$('queryInput'); ta.value=btn.textContent.trim(); autoResize(ta); updateCount(ta); ta.focus(); btn.closest('.suggestions').style.display='none'; }

function md(t) {
  return t
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[^]*?<\/li>)/g,'<ul>$1</ul>')
    .replace(/\n{2,}/g,'</p><p>')
    .replace(/\n/g,'<br>');
}

const KNOWN = {'Ti20Zr20Hf20Nb20Ta20':{ys:1600,el:50,src:'실측 DB'},'Ti19Zr19Hf19Nb19Ta19':{ys:1970,el:28.9,src:'실측 DB'}};
function makeCards(text) {
  const found=[...new Set(text.match(/[A-Z][a-z]?\d{1,3}(?:[A-Z][a-z]?\d{1,3}){2,}/g)||[])];
  if(!found.length) return '';
  return found.slice(0,3).map((f,i)=>{
    const k=KNOWN[f]||{};
    const ysM=text.match(/(?:YS|항복강도)[^\d]*?([\d,]+)\s*MPa/i);
    const elM=text.match(/(?:연신율|EL)[^\d]*?([\d.]+)\s*%/i);
    const ys=k.ys||(ysM?parseInt(ysM[1].replace(',','')):null);
    const el=k.el||(elM?parseFloat(elM[1]):null);
    const src=k.src||'ML/물리 추정';
    return `<div class="comp-card ${i===0?'best':''}">
  <div class="comp-card-head">
    <span class="comp-formula">${f}</span>
    ${i===0?'<span class="comp-badge badge-best">최우선 추천</span>':''}
  </div>
  <div class="comp-stats">
    <div class="comp-stat"><div class="comp-stat-lbl">YS</div><div class="comp-stat-val ${ys&&ys>=1000?'ok':'warn'}">${ys?ys.toLocaleString()+' MPa':'N/A'}</div></div>
    <div class="comp-stat"><div class="comp-stat-lbl">연신율</div><div class="comp-stat-val ${el&&el>=15?'ok':'warn'}">${el?el+'%':'N/A'}</div></div>
    <div class="comp-stat"><div class="comp-stat-lbl">BCC</div><div class="comp-stat-val ok">✓ 단상</div></div>
    <div class="comp-stat"><div class="comp-stat-lbl">출처</div><div class="comp-stat-val" style="font-size:10px">${src}</div></div>
  </div>
</div>`;
  }).join('');
}



function makeTraceTags(trace) {
  if(!trace) return '';
  return `<div class="trace-tags">
    <span class="ttag ok">✓ 파싱</span>
    <span class="ttag ${(trace.sql_count||0)>0?'ok':'info'}">DB ${trace.sql_count||0}건</span>
    <span class="ttag ${(trace.paper_count||0)>0?'ok':'info'}">논문 ${trace.paper_count||0}청크</span>
    <span class="ttag warn">YS R²=0.607</span>
  </div>`;
}

function demoReply(q) {
  q=q.toLowerCase();
  if(q.includes('ti')&&(q.includes('nb')||q.includes('ta')))
    return `## Ti-Nb-Ta 계 BCC HEA 추천\n\n**Ti20Zr20Hf20Nb20Ta20**\n- YS 실측: **1,600 MPa**, 연신율: **50%** (Wang 2021)\n- VEC=4.40, BCC 단상 ✓\n\n**Ti19Zr19Hf19Nb19Ta19**\n- YS 실측: **1,970 MPa**, 연신율: **28.9%**`;
  return `## BCC HEA 설계 안내\n\n원소 종류와 목표 물성을 구체적으로 알려주시면 실험 DB·논문·ML 예측 3계층으로 추천드립니다.`;
}

async function sendMessage() {
  const ta=$('queryInput'), text=ta.value.trim();
  if(!text||busy) return;
  busy=true; $('sendBtn').disabled=true;

  // 사용자 메시지
  const area=$('chatArea');
  const uEl=document.createElement('div'); uEl.className='msg';
  uEl.innerHTML=`<div class="msg-avatar av-user">나</div><div class="msg-body"><div class="msg-meta"><span class="msg-name user">사용자</span><span class="msg-time">${nowStr()}</span></div><div class="msg-text"><p>${text.replace(/\n/g,'<br>')}</p></div></div>`;
  area.appendChild(uEl);
  ta.value=''; ta.style.height='auto'; $('charCount').textContent='0 / 1000';

  // 로딩 메시지
  const loadEl=document.createElement('div'); loadEl.className='msg'; loadEl.id='loading';
  loadEl.innerHTML=`<div class="msg-avatar av-ai">HEA</div><div class="msg-body"><div class="msg-meta"><span class="msg-name ai">HEA Designer</span><span class="msg-time">${nowStr()}</span></div><div class="msg-text"><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`;
  area.appendChild(loadEl); area.scrollTop=area.scrollHeight;

  try {
    const resp=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,history})});
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const data=await resp.json();
    const reply=data.answer||'응답을 받지 못했습니다.';

    history.push({role:'user',content:text},{role:'assistant',content:reply});
    document.getElementById('loading')?.remove();

    const aiEl=document.createElement('div'); aiEl.className='msg';
    aiEl.innerHTML=`<div class="msg-avatar av-ai">HEA</div><div class="msg-body"><div class="msg-meta"><span class="msg-name ai">HEA Designer</span><span class="msg-time">${nowStr()}</span></div><div class="msg-text"><p>${md(reply)}</p>${makeCards(reply)}</div>${makeTraceTags(data.trace)}</div>`;
    area.appendChild(aiEl);
    if(data.trace) console.log('[RAG Trace]', data.trace);

  } catch(err) {
    console.warn('[시연 모드]',err.message);
    document.getElementById('loading')?.remove();
    const reply=demoReply(text);
    history.push({role:'user',content:text},{role:'assistant',content:reply});

    const aiEl=document.createElement('div'); aiEl.className='msg';
    aiEl.innerHTML=`<div class="msg-avatar av-ai">HEA</div><div class="msg-body"><div class="msg-meta"><span class="msg-name ai">HEA Designer</span><span class="msg-time">${nowStr()}</span></div><div class="msg-text"><p>${md(reply)}</p>${makeCards(reply)}</div><div class="warn-banner">⚠ 백엔드 미연결 — 시연 모드. python -m uvicorn app:app --reload --port 8000 으로 서버를 실행하면 실제 RAG 파이프라인이 동작합니다.</div></div>`;
    area.appendChild(aiEl);
  }

  area.scrollTop=area.scrollHeight;
  busy=false; $('sendBtn').disabled=false; $('queryInput').focus();
}

$('initTime').textContent=nowStr();
$('queryInput').addEventListener('input',function(){$('sendBtn').disabled=!this.value.trim()||busy;});
</script>
</body>
</html>
